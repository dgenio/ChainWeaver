name: Bug Report
description: Report a bug or unexpected behavior in ChainWeaver.
labels: [bug]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Minimal steps to reproduce the issue.
      placeholder: |
        1. Create a Flow with ...
        2. Call executor.execute_flow(...)
        3. Observe ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What actually happened? Include full tracebacks where relevant.
    validations:
      required: true

  - type: dropdown
    id: python_version
    attributes:
      label: Python version
      options:
        - "3.10"
        - "3.11"
        - "3.12"
        - "3.13"
    validations:
      required: true

  - type: input
    id: chainweaver_version
    attributes:
      label: ChainWeaver version
      placeholder: "e.g. 0.1.0"
    validations:
      required: true

  - type: textarea
    id: additional_context
    attributes:
      label: Additional context
      description: Any other context, screenshots, or relevant information.
    validations:
      required: false
