name: Bench

# CI performance-budget guard (issue #144).
#
# Runs the naive-vs-compiled benchmark on PRs and pushes to ``main`` and
# uploads the results to ``benchmark-action/github-action-benchmark``.
# History is stored in the repo's ``gh-pages`` branch (a one-off manual
# init step; see ``benchmarks/README.md``).
#
# Regression contract: a compiled metric that grows by more than 25%
# vs. the recorded baseline fails the build. ``customSmallerIsBetter``
# means smaller values are better; the action emits a PR comment when
# the threshold trips.
#
# The gate is enforced (fails the build) only on pushes to ``main``,
# where the baseline is captured on a consistent runner. On PRs it is
# advisory (comment-only): the sub-millisecond ``compiled`` overhead
# metrics swing 50-170us on shared CI runners, which trips the 25%
# alert on runner noise rather than a real regression.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Run-to-completion semantics — never overlap on the same ref, never
# skip in-flight runs by cancelling older ones.
concurrency:
  group: bench-${{ github.ref }}
  cancel-in-progress: false

permissions:
  # Required for benchmark-action/github-action-benchmark to push history
  # to the gh-pages branch and post PR comments.
  contents: write
  deployments: write
  pull-requests: write

jobs:
  bench:
    name: bench (ubuntu-22.04, Python 3.10)
    # Pinned runner OS to avoid the glibc-driven variance documented at
    # https://codspeed.io/blog/unrelated-benchmark-regression — wall-clock
    # microbenchmarks are noticeably sensitive to runner image bumps.
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6

      - name: Ensure gh-pages branch exists
        shell: bash
        run: |
          set -euo pipefail
          if git ls-remote --exit-code --heads origin gh-pages >/dev/null 2>&1; then
            echo "gh-pages branch already present."
            exit 0
          fi
          echo "Bootstrapping gh-pages (first run for benchmark-action history)."
          worktree="$(mktemp -d)"
          git worktree add --detach "$worktree" HEAD
          (
            cd "$worktree"
            git checkout --orphan gh-pages
            git rm -rfq . || true
            cat > README.md <<'TXT'
          # ChainWeaver benchmark history

          Auto-generated by `.github/workflows/bench.yml` via
          `benchmark-action/github-action-benchmark`. Do not edit by hand.
          TXT
            git -c user.name='github-actions[bot]' \
                -c user.email='41898282+github-actions[bot]@users.noreply.github.com' \
                add README.md
            git -c user.name='github-actions[bot]' \
                -c user.email='41898282+github-actions[bot]@users.noreply.github.com' \
                commit --quiet -m 'init: gh-pages for bench history'
            git push --quiet origin gh-pages
          )
          git worktree remove --force "$worktree"

      - name: Set up Python 3.10
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install ChainWeaver (dev extras)
        run: pip install -e ".[dev]"

      - name: Run benchmark
        run: |
          python benchmarks/bench_naive_vs_compiled.py \
            --repeats 5 \
            --output bench.json

      - name: Upload benchmark results
        uses: benchmark-action/github-action-benchmark@v1
        with:
          name: ChainWeaver microbenchmarks
          tool: customSmallerIsBetter
          output-file-path: bench.json
          github-token: ${{ secrets.GITHUB_TOKEN }}
          # Only archive results from main; PR-triggered runs would pollute
          # gh-pages with PR-branch data points and skew the alert baseline.
          auto-push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          gh-pages-branch: gh-pages
          benchmark-data-dir-path: dev/bench
          # Fail the PR if any compiled metric regresses > 25% vs. the
          # historical baseline on the same branch / gh-pages page.
          alert-threshold: "125%"
          # Enforce the gate only on main; PR runs stay advisory so
          # sub-millisecond microbenchmark variance on shared runners does
          # not fail PRs. ``comment-on-alert`` still surfaces a heads-up.
          fail-on-alert: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          comment-on-alert: true
          alert-comment-cc-users: "@dgenio"
