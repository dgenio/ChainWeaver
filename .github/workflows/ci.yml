name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly latest/pre-release canary (issue #236) — Mondays 06:00 UTC.
    - cron: "0 6 * * 1"

jobs:
  test:
    name: test (${{ matrix.os }}, Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    # Push/PR gate only; the scheduled run exercises the latest-deps canary below.
    if: github.event_name != 'schedule'
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install -e ".[dev]"

      # Lint / format / mypy / workflow + vocabulary checks live in the
      # dedicated `lint` job below so the static-analysis signal is a single
      # unambiguous gate, independent of the OS/Python test matrix.
      - name: Run tests
        run: python -m pytest tests/ -v

      # Property-based determinism tests are tagged @pytest.mark.property
      # and already run in the step above. We re-invoke them explicitly on
      # the canonical Python 3.10 / ubuntu lane with statistics enabled so
      # the Hypothesis seed is recorded in CI logs — the seed is what lets
      # contributors reproduce a shrunk counter-example locally.
      - name: Property tests (Hypothesis seed reporting)
        if: ${{ matrix.os == 'ubuntu-latest' && matrix.python-version == '3.10' }}
        run: python -m pytest tests/ -m property --no-cov --hypothesis-show-statistics -v

      # Execute the "Open in Colab" quickstart notebook (issue #229) so the
      # zero-install on-ramp can't silently rot. Run once on the canonical
      # ubuntu / 3.12 lane (3.12 matches Colab's runtime); --no-cov because the
      # notebook isn't part of the package coverage gate.
      - name: Run notebooks (nbmake)
        if: ${{ matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12' }}
        run: python -m pytest --nbmake notebooks/ --no-cov -v

  # Dedicated static-analysis gate (issue #458): lint, format, types, the
  # banned-vocabulary check (#466), and GitHub Actions workflow linting all
  # run once on the canonical Python 3.10 / ubuntu lane. Keeping them in one
  # job — instead of conditional steps buried in the test matrix — makes the
  # "is the code clean?" signal a single, clearly named check.
  lint:
    name: lint, format, types, workflows
    runs-on: ubuntu-latest
    if: github.event_name != 'schedule'
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.10
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      # These four invocations are the canonical commands from AGENTS.md §7,
      # verbatim (same scope, same flags) so local pre-commit == CI.
      - name: Lint with Ruff
        run: ruff check chainweaver/ tests/ examples/

      - name: Check formatting with Ruff
        run: ruff format --check chainweaver/ tests/ examples/

      - name: Type check with mypy
        run: python -m mypy chainweaver/ tests/

      - name: Check banned vocabulary (#466)
        run: python scripts/check_vocabulary.py

      # actionlint (pinned to match .pre-commit-config.yaml) lints every
      # workflow; the image bundles shellcheck so `run:` scripts are checked
      # too. Docker is available on GitHub-hosted ubuntu runners.
      - name: Lint GitHub Actions workflows (actionlint)
        run: docker run --rm -v "${PWD}:/repo" --workdir /repo rhysd/actionlint:1.7.7 -color

  conformance:
    name: weaver-spec conformance (#91)
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name != 'schedule'
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.10
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      # Dedicated gate so the conformance signal stays distinguishable
      # in the CI matrix even when other lanes fail.  Mirrors the
      # canonical command documented in docs/SPEC_COMPAT.md.
      #
      # ``--no-cov`` disables pyproject's package-wide coverage gate
      # for this subset run — coverage is enforced by the ``test`` job
      # above (which runs the full suite); on the conformance lane we
      # only care whether the 9 conformance tests pass.
      - name: Run weaver-spec conformance suite
        run: python -m pytest tests/test_weaver_spec_conformance.py -v -m conformance --no-cov

  # Floor-deps gate (issue #236): install the *minimum* declared dependency
  # versions and run the full suite on Python 3.10.  ``--resolution
  # lowest-direct`` pins every directly-declared dependency (the lean core plus
  # the extras under test) to its ``>=`` floor while letting transitive deps
  # resolve normally — proving each declared lower bound is truthful rather
  # than aspirational.  ``--no-cov`` because the coverage gate is enforced by
  # the ``test`` job; here we only assert behaviour at the floors.
  floor-deps:
    name: floor deps (min versions, Python 3.10)
    runs-on: ubuntu-latest
    if: github.event_name != 'schedule'
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.10
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Install uv
        run: python -m pip install uv

      - name: Install minimum declared dependency versions
        run: uv pip install --system --resolution lowest-direct -e ".[dev]"

      - name: Run tests against floor dependencies
        run: python -m pytest tests/ -v --no-cov

  # Latest / pre-release canary (issue #236): the safety net that *justifies*
  # shipping no upper-bound caps.  Runs weekly on the newest releases (incl.
  # pre-releases) of every dependency on Python 3.14 so a breaking ``pydantic``
  # / ``typer`` / ``deepdiff`` release is caught early.  Non-gating
  # (``continue-on-error``) — it warns, it does not block.
  latest-deps:
    name: latest/pre-release deps (Python 3.14)
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.14
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install newest (incl. pre-release) dependency versions
        run: |
          python -m pip install --upgrade pip
          pip install --pre --upgrade -e ".[dev]"

      - name: Run tests against latest dependencies
        run: python -m pytest tests/ -v --no-cov
