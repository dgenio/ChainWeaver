name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: test (${{ matrix.os }}, Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install -e ".[dev]"

      # Lint / format / mypy are stable across OSes and Pythons, so we run
      # them once (the canonical Python 3.10 on ubuntu-latest leg) to keep
      # the matrix fast and the gating signal unambiguous.
      - name: Lint with Ruff
        if: ${{ matrix.os == 'ubuntu-latest' && matrix.python-version == '3.10' }}
        run: ruff check chainweaver/ tests/ examples/

      - name: Check formatting with Ruff
        if: ${{ matrix.os == 'ubuntu-latest' && matrix.python-version == '3.10' }}
        run: ruff format --check chainweaver/ tests/ examples/

      - name: Type check with mypy
        if: ${{ matrix.os == 'ubuntu-latest' && matrix.python-version == '3.10' }}
        run: python -m mypy chainweaver/ tests/

      - name: Run tests
        run: python -m pytest tests/ -v

      # Property-based determinism tests are tagged @pytest.mark.property
      # and already run in the step above. We re-invoke them explicitly on
      # the canonical Python 3.10 / ubuntu lane with statistics enabled so
      # the Hypothesis seed is recorded in CI logs — the seed is what lets
      # contributors reproduce a shrunk counter-example locally.
      - name: Property tests (Hypothesis seed reporting)
        if: ${{ matrix.os == 'ubuntu-latest' && matrix.python-version == '3.10' }}
        run: python -m pytest tests/ -m property --no-cov --hypothesis-show-statistics -v
