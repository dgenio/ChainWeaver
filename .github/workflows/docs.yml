name: Docs

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Minimal default token scope (#495): the docs build only reads the repo.
permissions:
  contents: read

jobs:
  build:
    name: build docs
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install docs dependencies
        run: python -m pip install -e ".[docs]"

      - name: Build MkDocs site
        run: python -m mkdocs build --strict --site-dir site

      - name: Upload docs site artifact
        uses: actions/upload-artifact@v7
        with:
          name: chainweaver-docs-site
          path: site
