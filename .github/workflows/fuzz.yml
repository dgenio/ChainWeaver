name: Fuzz

# Scheduled property-based fuzzing of the executor (issue #340).
#
# The fuzz harness (``chainweaver/fuzz.py`` / ``chainweaver fuzz``) checks the
# BUILTIN_PROPERTIES against many generated inputs.  Run by hand it provides no
# standing regression value, so this workflow runs it weekly (and on demand) to
# surface property violations continuously.
#
# It is intentionally kept OUT of the PR-blocking path: a flaky generated input
# should not block merges.  Promote to PR CI once it has proven stable.
#
# It fuzzes examples/fuzzable_linear.flow.yaml (a schema-typed flow) against the
# `gracefully_handles_input` invariant (examples/fuzz_properties.py): every
# generated input — valid or deliberately corrupted by the fuzzer — must yield a
# success with output or a typed, recorded failure, never a crash.  That holds
# by default, so the job is green unless a real regression is introduced.
#
# On a violation the job fails and uploads the minimized counterexample; the
# seed is echoed prominently so a failure reproduces locally:
#
#     PYTHONPATH=. chainweaver fuzz examples/fuzzable_linear.flow.yaml \
#       --tools examples.simple_linear_flow \
#       --property examples.fuzz_properties:gracefully_handles_input \
#       --runs 200 --seed <SEED>

on:
  schedule:
    # 06:17 UTC every Monday (off the hour to avoid the scheduler rush).
    - cron: "17 6 * * 1"
  workflow_dispatch:
    inputs:
      runs:
        description: "Number of fuzz cases to generate"
        required: false
        default: "200"

concurrency:
  group: fuzz-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  fuzz:
    name: fuzz (ubuntu-latest, Python 3.12)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install ChainWeaver (dev extras)
        run: pip install -e ".[dev]"

      - name: Run fuzzer
        shell: bash
        # The repo root must be importable so `examples.*` resolves for both
        # --tools and --property.  Values flow through env (not direct ${{ }}
        # interpolation) so the user-supplied `runs` input cannot inject shell.
        env:
          PYTHONPATH: ${{ github.workspace }}
          SEED: ${{ github.run_id }}
          RUNS: ${{ github.event.inputs.runs || '200' }}
        run: |
          set -euo pipefail
          echo "::notice::Fuzzing with seed=${SEED} runs=${RUNS}"
          echo "Reproduce locally with:"
          echo "  PYTHONPATH=. chainweaver fuzz examples/fuzzable_linear.flow.yaml \\"
          echo "    --tools examples.simple_linear_flow \\"
          echo "    --property examples.fuzz_properties:gracefully_handles_input \\"
          echo "    --runs ${RUNS} --seed ${SEED}"
          chainweaver fuzz examples/fuzzable_linear.flow.yaml \
            --tools examples.simple_linear_flow \
            --property examples.fuzz_properties:gracefully_handles_input \
            --runs "${RUNS}" \
            --seed "${SEED}" \
            --minimize \
            --save-failures fuzz-failures

      - name: Upload minimized counterexamples
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: fuzz-failures-${{ github.run_id }}
          path: fuzz-failures/
          if-no-files-found: ignore
