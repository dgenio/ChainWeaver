name: Prepare release

# Release PRs are generated from the authoritative package version and merged
# through the normal branch-protection path. A successful main-branch CI run
# checks whether the source version on that commit is already tagged; if not,
# it verifies release metadata is consistent and tags the exact verified merge
# commit, then explicitly dispatches publish.yml because tag pushes made with
# GITHUB_TOKEN do not trigger another workflow. Detection is by version/tag
# drift rather than by PR branch name or label, so a release PR merged from a
# manually named branch (not the `release/vX.Y.Z` the `prepare` job below
# generates) still gets tagged instead of silently skipped.

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version in X.Y.Z format."
        required: true
        type: string
  workflow_run:
    workflows: ["CI"]
    types: [completed]

permissions:
  actions: write
  contents: write
  pull-requests: write

jobs:
  prepare:
    name: open release PR
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: main

      - name: Set up Python 3.10
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.10"

      - name: Prepare release metadata
        # Input flows through env (not direct ${{ }} interpolation) so it
        # cannot inject shell (#495).
        env:
          INPUT_VERSION: ${{ inputs.version }}
        run: python scripts/release.py prepare "${INPUT_VERSION}"

      - name: Verify release metadata
        env:
          INPUT_VERSION: ${{ inputs.version }}
        run: python scripts/release.py check --expected-version "${INPUT_VERSION}"

      - name: Generate release status
        run: python scripts/release.py status > "${RUNNER_TEMP}/release-status.md"

      - name: Open release PR
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          # Required because GitHub suppresses pull_request workflow events
          # created with GITHUB_TOKEN. Use a fine-grained PAT or App token.
          token: ${{ secrets.RELEASE_PR_TOKEN }}
          branch: release/v${{ inputs.version }}
          base: main
          commit-message: "release: prepare v${{ inputs.version }}"
          title: "Release v${{ inputs.version }}"
          body-path: ${{ runner.temp }}/release-status.md
          labels: release
          delete-branch: true
          add-paths: |
            chainweaver/__init__.py
            server.json
            .github/actions/chainweaver/action.yml
            .github/actions/chainweaver/README.md
            docs/github-action.md
            CHANGELOG.md

  tag:
    name: tag verified merge commit
    if: >-
      github.event_name == 'workflow_run' &&
      github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.head_branch == 'main' &&
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
      MERGE_SHA: ${{ github.event.workflow_run.head_sha }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ env.MERGE_SHA }}
          fetch-depth: 0

      - name: Set up Python 3.10
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.10"

      - name: Detect an untagged release version
        # Whether this main push is a pending release is a property of the
        # commit itself (source version has no matching tag yet), not of how
        # the release PR that produced it was branched or labeled — a release
        # PR merged from a manually named branch must still be caught. If the
        # tag already exists but points at a different commit, that is a
        # genuine version-bookkeeping inconsistency (a reverted or reused
        # version bump) and must fail loudly rather than silently skip.
        id: release
        shell: bash
        run: |
          set -euo pipefail
          version="$(python scripts/release.py version)"
          tag="v${version}"
          if existing_sha="$(git rev-parse -q --verify "refs/tags/${tag}^{commit}")"; then
            if [ "${existing_sha}" != "${MERGE_SHA}" ]; then
              echo "::error::Tag ${tag} already exists at ${existing_sha}, but commit ${MERGE_SHA} also has source version ${version}. A released version must not be reused for a different commit." >&2
              exit 1
            fi
            echo "release=false" >> "${GITHUB_OUTPUT}"
            exit 0
          fi
          python scripts/release.py check --expected-version "${version}"
          echo "release=true" >> "${GITHUB_OUTPUT}"
          echo "version=${version}" >> "${GITHUB_OUTPUT}"

      - name: Create release tag
        id: tag
        if: steps.release.outputs.release == 'true'
        shell: bash
        env:
          VERSION: ${{ steps.release.outputs.version }}
        run: |
          set -euo pipefail
          tag="v${VERSION}"
          git tag "${tag}" "${MERGE_SHA}"
          git push origin "${tag}"
          echo "created=true" >> "${GITHUB_OUTPUT}"

      - name: Dispatch publication
        if: steps.tag.outputs.created == 'true'
        env:
          VERSION: ${{ steps.release.outputs.version }}
        run: gh workflow run publish.yml --ref "v${VERSION}" -f version="${VERSION}"
