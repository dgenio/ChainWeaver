name: Update provider prices

# Monthly maintenance for the cost-avoided price table (issue #156).
#
# Provider pricing drifts; this workflow keeps chainweaver/cost.py's
# PROVIDER_PRICES snapshots honest. It runs scripts/refresh_prices.py (which is
# a no-op until a maintainer wires a real scraper) and opens a pull request iff
# the script produced a diff. The PR is NEVER auto-merged — a human must verify
# pricing before it lands, per the issue's "humans must verify pricing" rule.
#
# The in-repo snapshot always works offline even when this workflow is skipped
# or scraping fails, so nothing here is on the runtime path.

on:
  schedule:
    # 06:00 UTC on the 1st of each month.
    - cron: "0 6 1 * *"
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

jobs:
  refresh:
    name: refresh price table
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python 3.10
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Install ChainWeaver
        run: pip install -e .

      - name: Refresh price snapshots
        run: python scripts/refresh_prices.py --max-age-days 35

      - name: Open price-update PR (if anything changed)
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: chore/refresh-provider-prices
          commit-message: "chore: refresh provider price snapshots (#156)"
          title: "chore: refresh provider price snapshots (#156)"
          body: |
            Automated monthly refresh of `chainweaver/cost.py` `PROVIDER_PRICES`.

            **Do not auto-merge.** Verify every figure against the provider's
            current public pricing page and confirm each `as_of` date before
            approving.
          labels: |
            cost
            needs-review
          # Never merge automatically — the PR waits for human review.
          delete-branch: true
