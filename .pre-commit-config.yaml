# Pre-commit hooks for ChainWeaver.
#
# These hooks mirror three of the four AGENTS.md §7 validation commands
# (ruff check, ruff format --check, mypy). pytest is excluded from
# pre-commit to keep commit speed reasonable — run it manually or rely
# on CI. Hooks use `language: system` so they run from the project venv
# with the same tool versions as `pip install -e ".[dev]"`.
#
# See CONTRIBUTING.md § "Pre-commit hooks" for install instructions and
# the policy on hook failures.

repos:
  # ---------------------------------------------------------------
  # Stdlib hygiene
  # ---------------------------------------------------------------
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-added-large-files
        args: ["--maxkb=500"]
      - id: check-merge-conflict
      - id: detect-private-key

  # ---------------------------------------------------------------
  # Ruff: lint + format-check (system hooks — uses project venv)
  # ---------------------------------------------------------------
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check chainweaver/ tests/ examples/
        entry: ruff check chainweaver/ tests/ examples/
        language: system
        pass_filenames: false
        always_run: true
      - id: ruff-format-check
        name: ruff format --check chainweaver/ tests/ examples/
        entry: ruff format --check chainweaver/ tests/ examples/
        language: system
        pass_filenames: false
        always_run: true

  # ---------------------------------------------------------------
  # Mypy strict type-check (system hook — uses project venv)
  # ---------------------------------------------------------------
  - repo: local
    hooks:
      - id: mypy
        name: python -m mypy chainweaver/ tests/
        entry: python -m mypy chainweaver/ tests/
        language: system
        pass_filenames: false
        always_run: true

  # ---------------------------------------------------------------
  # Secret scanning — gitleaks (richer than detect-private-key alone)
  # ---------------------------------------------------------------
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks

  # ---------------------------------------------------------------
  # actionlint — keep .github/workflows/*.yml syntactically valid
  # ---------------------------------------------------------------
  - repo: https://github.com/rhysd/actionlint
    rev: v1.7.4
    hooks:
      - id: actionlint
