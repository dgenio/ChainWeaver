site_name: ChainWeaver
site_description: Deterministic orchestration layer for MCP-based agents.
site_url: https://chainweaver.readthedocs.io/
repo_url: https://github.com/dgenio/ChainWeaver
repo_name: dgenio/ChainWeaver
edit_uri: edit/main/docs/
copyright: Apache-2.0 licensed.

# Files under docs/agent-context/ target coding agents (Claude, Copilot, etc.) and
# stay out of the public-site navigation by design.  ``not_in_nav`` silences mkdocs'
# strict-mode warning while still building the pages so cross-links from AGENTS.md
# resolve when the docs site is mirrored.
not_in_nav: |
  agent-context/
  v1-release-criteria.md

theme:
  name: material
  features:
    - navigation.instant
    - navigation.tabs
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - search.highlight
    - search.share
    - search.suggest
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - toc.follow
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  icon:
    repo: fontawesome/brands/github

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            docstring_style: google
            show_root_heading: true
            show_source: false
            members_order: source
            separate_signature: true
            show_signature_annotations: true

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true

nav:
  - Home: index.md
  - Getting started:
      - Installation: getting-started/installation.md
      - Your first flow: getting-started/first-flow.md
      - The @tool decorator: getting-started/decorator-api.md
      - FlowBuilder: getting-started/flow-builder.md
  - Concepts:
      - Tools and flows: concepts/tools-and-flows.md
      - Determinism: concepts/determinism.md
      - Execution trace: concepts/execution-trace.md
      - Schema validation: concepts/schema-validation.md
  - Is this for me?:
      - When ChainWeaver fits: boundaries.md
      - Data integrity guarantees: data-integrity.md
      - Runtime responsibilities for hosts: runtime-responsibilities.md
      - vs LangChain, Prefect, Dagster, Temporal, LangGraph: comparisons.md
  - Cookbook:
      - Overview: cookbook/index.md
      - 1. Naive LLM loop to compiled flow: cookbook/01-naive-to-compiled.md
      - 2. MCP-style search and summarize: cookbook/02-mcp-style-flow.md
      - 3. OpenTelemetry tracing: cookbook/03-otel-tracing.md
      - 4. Testing flows: cookbook/04-testing-flows.md
      - 5. Schema drift in CI: cookbook/05-schema-drift.md
      - 6. Fan-out / fan-in DAG patterns: cookbook/06-dag-fanout.md
  - Reference:
      - CLI: cli.md
      - Error table: reference/error-table.md
      - Versioning policy: versioning-policy.md
      - Security policy: security.md
