[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "chainweaver"
version = "0.7.0"
description = "Deterministic orchestration layer for MCP-based agents."
readme = "README.md"
license = { file = "LICENSE" }
requires-python = ">=3.10"
keywords = ["mcp", "agents", "orchestration", "deterministic", "workflow"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: Apache Software License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Software Development :: Libraries :: Python Modules",
    "Typing :: Typed",
]
dependencies = [
    "deepdiff>=8.0",
    "packaging>=21.0",
    "pydantic>=2.0",
    "tenacity>=8.0",
    "typer>=0.9",
]

[project.scripts]
chainweaver = "chainweaver.cli:main"

[project.entry-points.pytest11]
chainweaver = "pytest_chainweaver"

[project.optional-dependencies]
yaml = [
    "pyyaml>=6.0",
]
otel = [
    "opentelemetry-api>=1.20",
]
dev = [
    "pytest>=7.0",
    "pytest-cov>=4.0",
    "ruff>=0.8",
    "mypy>=1.0",
    "pyyaml>=6.0",
    "types-pyyaml>=6.0",
    "opentelemetry-api>=1.20",
    "opentelemetry-sdk>=1.20",
]

[project.urls]
"Homepage" = "https://github.com/dgenio/ChainWeaver"
"Bug Tracker" = "https://github.com/dgenio/ChainWeaver/issues"

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
addopts = "--cov=chainweaver --cov-report=term-missing --cov-fail-under=80"

[tool.ruff]
target-version = "py310"
line-length = 99

[tool.ruff.lint]
select = [
    "E",    # pycodestyle errors
    "W",    # pycodestyle warnings
    "F",    # pyflakes
    "I",    # isort
    "UP",   # pyupgrade
    "B",    # flake8-bugbear
    "SIM",  # flake8-simplify
    "RUF",  # Ruff-specific rules
]

[tool.ruff.lint.isort]
known-first-party = ["chainweaver"]

[tool.ruff.format]
quote-style = "double"
skip-magic-trailing-comma = false

[tool.mypy]
python_version = "3.10"
strict = true

[[tool.mypy.overrides]]
module = "tests.*"
disallow_untyped_defs = false

[tool.setuptools.packages.find]
where = ["."]
include = ["chainweaver*"]

# The pytest plugin (``pytest_chainweaver``) lives at the repo root so
# that pytest's ``pytest11`` entry-point loader does not transitively
# import ``chainweaver`` before ``pytest-cov`` can start coverage
# tracking.  Without this, every import-time statement in the
# ChainWeaver package would be counted as "missed" and the project-
# wide coverage percentage would collapse from ~94 % to ~64 %.  See
# the module docstring of ``pytest_chainweaver.py`` for details.
[tool.setuptools]
py-modules = ["pytest_chainweaver"]
