[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "chainweaver"
version = "0.7.0"
description = "Deterministic orchestration layer for MCP-based agents."
readme = "README.md"
license = { file = "LICENSE" }
requires-python = ">=3.10"
keywords = ["mcp", "agents", "orchestration", "deterministic", "workflow"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: Apache Software License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Software Development :: Libraries :: Python Modules",
    "Typing :: Typed",
]
dependencies = [
    "deepdiff>=8.0",
    "packaging>=21.0",
    "pydantic>=2.0",
    "tenacity>=8.0",
    "typer>=0.9",
]

[project.scripts]
chainweaver = "chainweaver.cli:main"

[project.optional-dependencies]
yaml = [
    "pyyaml>=6.0",
]
otel = [
    "opentelemetry-api>=1.20",
]
# Property-based testing extra (issue #143).  Kept out of the default install
# and out of [dev] so the existing single-dep promise (pydantic only) holds
# for end users and CI lanes that don't run the property tests.  Enable via
# ``pip install 'chainweaver[test]'`` (CI does this on the property leg).
test = [
    "hypothesis>=6.150",
]
dev = [
    "pytest>=7.0",
    "pytest-cov>=4.0",
    "ruff>=0.8",
    "mypy>=1.0",
    "pyyaml>=6.0",
    "types-pyyaml>=6.0",
    "opentelemetry-api>=1.20",
    "opentelemetry-sdk>=1.20",
    "hypothesis>=6.150",
]

[project.urls]
"Homepage" = "https://github.com/dgenio/ChainWeaver"
"Bug Tracker" = "https://github.com/dgenio/ChainWeaver/issues"

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
addopts = "--cov=chainweaver --cov-report=term-missing --cov-fail-under=80"
markers = [
    "property: Hypothesis property-based determinism tests (issue #143). Opt-in via `pytest -m property`; default suite still runs them but CI gates on a separate fast-feedback leg.",
]

[tool.ruff]
target-version = "py310"
line-length = 99

[tool.ruff.lint]
select = [
    "E",    # pycodestyle errors
    "W",    # pycodestyle warnings
    "F",    # pyflakes
    "I",    # isort
    "UP",   # pyupgrade
    "B",    # flake8-bugbear
    "SIM",  # flake8-simplify
    "RUF",  # Ruff-specific rules
]

[tool.ruff.lint.isort]
known-first-party = ["chainweaver"]

[tool.ruff.format]
quote-style = "double"
skip-magic-trailing-comma = false

[tool.mypy]
python_version = "3.10"
strict = true

[[tool.mypy.overrides]]
module = "tests.*"
disallow_untyped_defs = false

[tool.setuptools.packages.find]
where = ["."]
include = ["chainweaver*"]
